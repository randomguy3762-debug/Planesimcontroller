<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pro Flight Sim - Controller</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; user-select: none; touch-action: none; }
  
  #hud {
    position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
    color: white; background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 20px;
    font-size: 14px; pointer-events: none; border: 1px solid rgba(255,255,255,0.2);
    display: flex; gap: 15px; white-space: nowrap; z-index: 100;
  }

  #gearToggle {
    position: fixed; top: 15px; left: 15px;
    color: white; font-weight: bold; font-size: 14px; z-index: 101;
  }
  .gear-down { color: #00ff00 !important; }

  #gameOver {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9); display: none; flex-direction: column;
    align-items: center; justify-content: center; z-index: 1000; color: white;
  }
</style>
</head>
<body>

<div id="gameOver">
    <h1>PLANE CRASHED!</h1>
    <p>Press 'A' button to restart.</p>
</div>

<div id="gearToggle" class="gear-down">GEAR: DN</div>

<div id="hud">
    <span>SPD: <b id="spd">0</b> kts</span>
    <span>ALT: <b id="alt">0</b> ft</span>
    <span>THR: <b id="thr">0</b>%</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>
/** * SCENE SETUP **/
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x6ebdf2);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 10000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff, 1.5);
light.position.set(100, 200, 100);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff, 0.4));

const ground = new THREE.Mesh(new THREE.PlaneGeometry(10000, 10000), new THREE.MeshStandardMaterial({color: 0x2d4a22}));
ground.rotation.x = -Math.PI/2;
scene.add(ground);

const runway = new THREE.Mesh(new THREE.PlaneGeometry(40, 1200), new THREE.MeshStandardMaterial({color: 0x111111}));
runway.rotation.x = -Math.PI/2;
runway.position.y = 0.01;
scene.add(runway);

for(let i=0; i<50; i++) {
    const h = 20 + Math.random() * 80;
    const b = new THREE.Mesh(new THREE.BoxGeometry(15, h, 15), new THREE.MeshStandardMaterial({color: 0x444455}));
    b.position.set(Math.random() * 600 - 300, h/2, -1000 - (Math.random() * 1000));
    scene.add(b);
}

/** * PLANE **/
const planeGroup = new THREE.Group();
const redMat = new THREE.MeshStandardMaterial({color: 0xcc0000});
const blackMat = new THREE.MeshStandardMaterial({color: 0x111111});

const fuse = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.2, 4.5, 8), redMat);
fuse.rotation.x = Math.PI/2;
planeGroup.add(fuse);
const wings = new THREE.Mesh(new THREE.BoxGeometry(7, 0.1, 1.5), redMat);
planeGroup.add(wings);
const prop = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.15, 0.1), blackMat);
prop.position.z = 2.3;
planeGroup.add(prop);

const gearGroup = new THREE.Group();
const wheels = [];
const createW = (x, z) => {
    const g = new THREE.Group();
    const w = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.15), blackMat);
    w.rotation.z = Math.PI/2; w.position.y = -0.4;
    g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.8), blackMat));
    g.add(w); g.position.set(x, -0.2, z);
    gearGroup.add(g); wheels.push(w);
};
createW(1, 0.5); createW(-1, 0.5); createW(0, -1.8);
planeGroup.add(gearGroup);
scene.add(planeGroup);

/** * CONTROLS **/
let speed = 0, targetSpeed = 0, yaw = 0, pitch = 0, roll = 0, gearPos = 1;
let gearOn = true, crashed = false, thrust = 0;
let gearJustPressed = false;

function animate() {
    if (crashed) return;
    requestAnimationFrame(animate);

    // GAMEPAD INPUT
    const gamepads = navigator.getGamepads();
    if (gamepads[0]) {
        const gp = gamepads[0];
        // Left Stick (Y: Pitch, X: Yaw/Roll)
        if (Math.abs(gp.axes[1]) > 0.1) pitch += (gp.axes[1] * -0.05);
        if (Math.abs(gp.axes[0]) > 0.1) yaw -= (gp.axes[0] * 0.05);
        
        // Thrust (Triggers: R2/L2)
        thrust = ((gp.buttons[7].value - gp.buttons[6].value + 1) / 2) * 100;
        
        // Gear (Button 3: Y/Triangle)
        if (gp.buttons[3].pressed && !gearJustPressed) {
            gearOn = !gearOn;
            gearJustPressed = true;
        } else if (!gp.buttons[3].pressed) { gearJustPressed = false; }
        
        // Restart (Button 0: A/Cross)
        if (gp.buttons[0].pressed) location.reload();
    }

    targetSpeed = thrust / 45; 
    speed = THREE.MathUtils.lerp(speed, targetSpeed, 0.015);
    prop.rotation.z += speed * 1.5;

    gearPos = THREE.MathUtils.lerp(gearPos, gearOn ? 1 : 0, 0.1);
    gearGroup.scale.set(1, gearPos, 1);
    gearGroup.position.y = (1 - gearPos) * 0.4;

    const altitude = planeGroup.position.y - (gearOn ? 0.9 : 0.4);
    const airborne = altitude > 0.2;
    pitch *= 0.94;

    if (speed > 0.3) {
        planeGroup.rotation.x = THREE.MathUtils.lerp(planeGroup.rotation.x, -pitch, 0.05);
        planeGroup.position.y += Math.sin(-planeGroup.rotation.x) * speed;
    }

    // Physics
    roll = THREE.MathUtils.lerp(roll, airborne ? -yaw * 2 : 0, 0.1);
    planeGroup.rotation.set(planeGroup.rotation.x, yaw, roll);
    planeGroup.position.x += Math.sin(yaw) * speed * Math.cos(planeGroup.rotation.x);
    planeGroup.position.z += Math.cos(yaw) * speed * Math.cos(planeGroup.rotation.x);

    const minH = gearOn ? 0.9 : 0.4;
    if (planeGroup.position.y < minH) {
        if (!gearOn && speed > 0.25) { crashed = true; document.getElementById('gameOver').style.display = 'flex'; }
        planeGroup.position.y = minH;
        if (planeGroup.rotation.x > 0) planeGroup.rotation.x = 0;
    }

    const camOffset = new THREE.Vector3(0, 2.5, -11).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
    camera.position.lerp(planeGroup.position.clone().add(camOffset), 0.1);
    camera.lookAt(planeGroup.position.x, planeGroup.position.y + 0.5, planeGroup.position.z);

    // HUD
    const gt = document.getElementById('gearToggle');
    gt.innerText = gearOn ? "GEAR: DN" : "GEAR: UP";
    gt.className = gearOn ? "gear-down" : "";
    document.getElementById('spd').innerText = Math.round(speed * 120);
    document.getElementById('alt').innerText = Math.max(0, Math.round(altitude * 25));
    document.getElementById('thr').innerText = Math.round(thrust);
    
    wheels.forEach(w => w.rotation.x += speed * 3);
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
